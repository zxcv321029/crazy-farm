<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔派對農場規劃器 V2</title>
    <style>
        :root {
            --bg-main: #f0f4f8;
            --bg-container: #ffffff;
            --text-main: #2d3748;
            --border-color: #cbd5e1;
            /* 調整格線顏色與樣式，更貼近圖片的灰藍質感 */
            --grid-line: #e2e8f0;
            --navy-dark: #334155; 
            --accent-blue: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #1e3a8a;
            text-align: center;
        }

        /* 頂部控制列 */
        .controls {
            background: var(--bg-container);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: #cbd5e1;
            margin: 0 5px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background-color: #fff;
        }

        select:focus, input[type="number"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-success:hover { background-color: #059669; }
        .btn-secondary { background-color: #64748b; color: white; }
        .btn-secondary:hover { background-color: #475569; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }

        /* 大地圖版面佈局 - 六區排列組合 */
        .map-container {
            background: var(--bg-container);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: auto auto auto;
            grid-template-rows: auto auto auto;
            gap: 5px;
            position: relative;
            user-select: none;
            width: fit-content;
        }

        /* 根據附圖重新精準定義的十字分界線 */
        .cross-h {
            grid-column: 1 / -1;
            height: 2px;
            background-color: #94a3b8;
            align-self: center;
            margin: 15px 0;
            opacity: 0.7;
        }

        .cross-v {
            grid-row: 1 / -1;
            width: 2px;
            background-color: #94a3b8;
            justify-self: center;
            margin: 0 15px;
            opacity: 0.7;
        }

        /* 8x8 獨立區塊 */
        .zone {
            display: flex;
            flex-direction: column;
        }

        /* 配合附圖：統一乾淨白底加深灰藍細外框 */
        .grid-8x8 {
            display: grid;
            grid-template-columns: repeat(8, 48px);
            grid-template-rows: repeat(8, 48px);
            border: 2px solid var(--accent-blue);
            background: #ffffff;
        }

        /* 單一格子：全面統一成乾淨淡色格線 */
        .cell {
            border: 1px solid var(--grid-line);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            background-color: #ffffff;
            transition: background-color 0.1s;
        }

        .cell:hover {
            outline: 2px solid #3b82f6;
            z-index: 10;
        }

        /* 水果標籤文字與微透明等級樣式 */
        .cell .crop-text {
            font-size: 14px;
            line-height: 1.2;
        }
        
        .cell .level-text {
            font-size: 10px;
            margin-top: 2px;
            font-weight: normal;
        }

        /* 座標標籤樣式 - 與附圖完全一致的深灰藍文字 */
        .labels-row {
            display: grid;
            grid-template-columns: repeat(8, 48px);
            text-align: center;
            height: 25px;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .labels-col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 25px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-blue);
            height: 384px; /* 48px * 8 */
        }

        .zone-body {
            display: flex;
            align-items: center;
        }

        /* 26種作物顏色：只改變格子內文字顏色與微量淡背景，背景統一維持白底乾淨質感 */
        .c-none { background-color: #ffffff; color: #000; }

        /* 至臻系列 */
        .c-菊 { background-color: #f0f7ff; color: #1d4ed8; }
        .c-葵 { background-color: #fffaf0; color: #ea580c; }
        .c-松 { background-color: #fffbeb; color: #b45309; }
        .c-象 { background-color: #f0fdf4; color: #166534; }
        .c-菇 { background-color: #faf5ff; color: #6b21a8; }
        .c-蟠 { background-color: #fdf4ff; color: #9d174d; }
        .c-葡 { background-color: #fdf2f8; color: #be185d; }
        .c-椒 { background-color: #fef2f2; color: #991b1b; }
        .c-彼 { background-color: #fff1f2; color: #9f1239; }

        /* 黃金系列 */
        .c-莓 { background-color: #fff1f2; color: #e11d48; }
        .c-梿 { background-color: #fff7ed; color: #c2410c; }
        .c-荔 { background-color: #f0fdf4; color: #15803d; }
        .c-異 { background-color: #fefce8; color: #854d0e; }

        /* 紫色系列 */
        .c-蕉 { background-color: #fdfbec; color: #a16207; }
        .c-蘋 { background-color: #fff5f5; color: #c53030; }
        .c-石 { background-color: #faf5ff; color: #553c9a; }
        .c-椰 { background-color: #f0fdfa; color: #0f766e; }
        .c-南 { background-color: #fff9db; color: #e67e22; }
        .c-櫻 { background-color: #fff0f6; color: #9d174d; }

        /* 藍色系列 */
        .c-玉 { background-color: #fefce8; color: #713f12; }
        .c-西 { background-color: #f0fdf4; color: #166534; }
        .c-牽 { background-color: #f0f9ff; color: #0369a1; }
        .c-梨 { background-color: #f8fafc; color: #334155; }
        .c-橘 { background-color: #fff7ed; color: #9a3412; }
        .c-棉 { background-color: #f1f5f9; color: #475569; }
        .c-菜 { background-color: #f0fdf4; color: #14532d; }

        /* 說明面板 */
        .legend-panel {
            background: var(--bg-container);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 25px;
            width: 100%;
            max-width: 1100px;
        }
        .legend-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #1e3a8a;
            font-size: 15px;
        }
        .legend-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            background: #fff;
        }
        .legend-item:hover {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
            max-width: 800px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>蛋仔派對農場開放式規劃器 (背景優化與雲端防丟版)</h1>

    <!-- 頂部刷子工具與存檔面板 -->
    <div class="controls">
        <div class="control-group">
            <label for="cropSelect">目前作物:</label>
            <select id="cropSelect">
                <option value="">🚫 清除/空白</option>
                <optgroup label="至臻">
                    <option value="菊">大王菊 (菊)</option>
                    <option value="葵">向日葵 (葵)</option>
                    <option value="松">松樹 (松)</option>
                    <option value="象">仙人掌象 (象)</option>
                    <option value="菇">驚奇菇 (菇)</option>
                    <option value="蟠">蟠桃 (蟠)</option>
                    <option value="葡">葡萄 (葡)</option>
                    <option value="椒">朝天椒 (椒)</option>
                    <option value="彼">彼岸花 (彼)</option>
                </optgroup>
                <optgroup label="黃金">
                    <option value="莓">草莓 (莓)</option>
                    <option value="梿">榴槤 (梿)</option>
                    <option value="荔">荔枝 (荔)</option>
                    <option value="異">奇異果 (異)</option>
                </optgroup>
                <optgroup label="紫色">
                    <option value="蕉">香蕉 (蕉)</option>
                    <option value="蘋">蘋果 (蘋)</option>
                    <option value="石">石榴 (石)</option>
                    <option value="椰">椰子 (椰)</option>
                    <option value="南">南瓜 (南)</option>
                    <option value="櫻">櫻桃 (櫻)</option>
                </optgroup>
                <optgroup label="藍色">
                    <option value="玉">玉米 (玉)</option>
                    <option value="西">西瓜 (西)</option>
                    <option value="牽">牽牛花 (牽)</option>
                    <option value="梨">梨作物 (梨)</option>
                    <option value="橘">橘子 (橘)</option>
                    <option value="棉">棉花 (棉)</option>
                    <option value="菜">白菜 (菜)</option>
                </optgroup>
            </select>
        </div>

        <div class="control-group">
            <label for="levelInput">等級/數量:</label>
            <input type="number" id="levelInput" min="1" max="9" value="1" style="width: 55px;">
        </div>

        <button class="btn btn-primary" id="dragModeBtn">滑鼠連續塗鴉: 關閉</button>
        
        <div class="divider"></div>

        <!-- 存檔與安全性控制項 -->
        <button class="btn btn-success" id="saveBtn" title="手動將資料同步進瀏覽器保險箱">💾 立即保存檔案</button>
        <span id="saveStatus" style="font-size: 12px; color: #059669; font-weight: bold; min-width: 120px;">已自動載入進度</span>
        
        <div class="divider"></div>
        <button class="btn btn-secondary" id="exportBtn" title="導出成文字檔，可在其他電腦載入">📤 備份導出</button>
        <button class="btn btn-secondary" id="importBtn" title="導入之前的文字檔備份">📥 還原載入</button>
        <button class="btn btn-danger" id="clearAllBtn">🧹 全清</button>
    </div>

    <!-- 6區大矩陣 -->
    <div class="map-container" id="mapMain">
        <!-- 上左區 (Zone 1) -->
        <div class="zone" id="z1">
            <div class="labels-row"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div></div>
            <div class="zone-body">
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
                <div class="grid-8x8" data-zone="1"></div>
            </div>
        </div>

        <div class="cross-v"></div>

        <!-- 上右區 (Zone 2) -->
        <div class="zone" id="z2">
            <div class="labels-row"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
            <div class="zone-body">
                <div class="grid-8x8" data-zone="2"></div>
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
            </div>
        </div>

        <!-- 中間線 -->
        <div class="cross-h"></div>
        <div></div>
        <div class="cross-h"></div>

        <!-- 中左區 (Zone 3) -->
        <div class="zone" id="z3">
            <div class="labels-row"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div></div>
            <div class="zone-body">
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
                <div class="grid-8x8" data-zone="3"></div>
            </div>
        </div>

        <div class="cross-v"></div>

        <!-- 中右區 (Zone 4) -->
        <div class="zone" id="z4">
            <div class="labels-row"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
            <div class="zone-body">
                <div class="grid-8x8" data-zone="4"></div>
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
            </div>
        </div>

        <!-- 中間線 -->
        <div class="cross-h"></div>
        <div></div>
        <div class="cross-h"></div>

        <!-- 下左區 (Zone 5) -->
        <div class="zone" id="z5">
            <div class="zone-body">
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
                <div class="grid-8x8" data-zone="5"></div>
            </div>
            <div class="labels-row"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div></div>
        </div>

        <div class="cross-v"></div>

        <!-- 下右區 (Zone 6) -->
        <div class="zone" id="z6">
            <div class="zone-body">
                <div class="grid-8x8" data-zone="6"></div>
                <div class="labels-col"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
            </div>
            <div class="labels-row"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
        </div>
    </div>

    <!-- 底部調色盤 -->
    <div class="legend-panel">
        <div class="legend-title">作物調色盤快速切換：</div>
        <div class="legend-grid" id="paletteGrid"></div>
    </div>

    <div class="footer-text">

    </div>

    <script>
        const cropsData = [
            { name: '大王菊', short: '菊', cat: '至臻' }, { name: '向日葵', short: '葵', cat: '至臻' },
            { name: '松樹', short: '松', cat: '至臻' }, { name: '仙人掌象', short: '象', cat: '至臻' },
            { name: '驚奇菇', short: '菇', cat: '至臻' }, { name: '蟠桃', short: '蟠', cat: '至臻' },
            { name: '葡萄', short: '葡', cat: '至臻' }, { name: '朝天椒', short: '椒', cat: '至臻' },
            { name: '彼岸花', short: '彼', cat: '至臻' }, { name: '草莓', short: '莓', cat: '黃金' },
            { name: '榴槤', short: '梿', cat: '黃金' }, { name: '荔枝', short: '荔', cat: '黃金' },
            { name: '奇異果', short: '異', cat: '黃金' }, { name: '香蕉', short: '蕉', cat: '紫色' },
            { name: '蘋果', short: '蘋', cat: '紫色' }, { name: '石榴', short: '石', cat: '紫色' },
            { name: '椰子', short: '椰', cat: '紫色' }, { name: '南瓜', short: '南', cat: '紫色' },
            { name: '櫻桃', short: '櫻', cat: '紫色' }, { name: '玉米', short: '玉', cat: '藍色' },
            { name: '西瓜', short: '西', cat: '藍色' }, { name: '牽牛花', short: '牽', cat: '藍色' },
            { name: '梨作物', short: '梨', cat: '藍色' }, { name: '橘子', short: '橘', cat: '藍色' },
            { name: '棉花', short: '棉', cat: '藍色' }, { name: '白菜', short: '菜', cat: '藍色' }
        ];

        let isDragMode = false;
        let isMouseDown = false;
        const STORAGE_KEY = 'eggy_farm_planner_save';

        // 初始化六個 8x8 格子
        const grids = document.querySelectorAll('.grid-8x8');
        grids.forEach(grid => {
            const zoneNum = grid.getAttribute('data-zone');
            
            for (let row = 8; row >= 1; row--) {
                for (let col = 1; col <= 8; col++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', 'c-none');
                    
                    // 紀錄精準內置座標
                    cell.dataset.zone = zoneNum;
                    cell.dataset.row = row;
                    cell.dataset.col = (zoneNum == '2' || zoneNum == '4' || zoneNum == '6') ? (9 - col) : col;

                    // 監聽事件
                    cell.addEventListener('mousedown', (e) => {
                        isMouseDown = true;
                        applyBrush(cell);
                    });

                    cell.addEventListener('mouseenter', () => {
                        if (isDragMode && isMouseDown) {
                            applyBrush(cell);
                        }
                    });

                    grid.appendChild(cell);
                }
            }
        });

        window.addEventListener('mouseup', () => { isMouseDown = false; });

        function applyBrush(cell) {
            const crop = document.getElementById('cropSelect').value;
            let level = document.getElementById('levelInput').value.trim();

            cropsData.forEach(c => cell.classList.remove(`c-${c.short}`));
            cell.classList.remove('c-none');

            if (!crop) {
                cell.classList.add('c-none');
                cell.innerHTML = '';
            } else {
                cell.classList.add(`c-${crop}`);
                if(level) {
                    cell.innerHTML = `<span class="crop-text">${crop}</span><span class="level-text">${level}</span>`;
                } else {
                    cell.innerHTML = `<span class="crop-text">${crop}</span>`;
                }
            }
            // 即時防丟：每次修改自動存檔
            autoSaveData();
        }

        // 連續塗鴉模式
        const dragModeBtn = document.getElementById('dragModeBtn');
        dragModeBtn.addEventListener('click', () => {
            isDragMode = !isDragMode;
            if (isDragMode) {
                dragModeBtn.textContent = '滑鼠連續塗鴉: 開啟 ✔';
                dragModeBtn.style.backgroundColor = '#10b981';
            } else {
                dragModeBtn.textContent = '滑鼠連續塗鴉: 關閉';
                dragModeBtn.style.backgroundColor = '#3b82f6';
            }
        });

        // 🧹 全清
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('確定要清空整張地圖嗎？')) {
                document.querySelectorAll('.cell').forEach(cell => {
                    cropsData.forEach(c => cell.classList.remove(`c-${c.short}`));
                    cell.className = 'cell c-none';
                    cell.innerHTML = '';
                });
                autoSaveData();
                showStatus('地圖已清空');
            }
        });

        // 快速選取面板
        const paletteGrid = document.getElementById('paletteGrid');
        cropsData.forEach(crop => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            const colorBox = document.createElement('div');
            colorBox.className = `color-box c-${crop.short}`;
            const label = document.createElement('span');
            label.textContent = `${crop.name}(${crop.short})`;
            item.appendChild(colorBox);
            item.appendChild(label);
            item.addEventListener('click', () => {
                document.getElementById('cropSelect').value = crop.short;
            });
            paletteGrid.appendChild(item);
        });

        // ====================== 🔒 存檔核心機制編寫 ======================
        
        function showStatus(msg) {
            const statusEl = document.getElementById('saveStatus');
            statusEl.textContent = msg;
            setTimeout(() => { statusEl.textContent = '● 自動存檔防護中'; }, 3000);
        }

        // 1. 自動存檔 (打包目前全場狀態)
        function autoSaveData() {
            const cells = document.querySelectorAll('.cell');
            const dataState = [];
            cells.forEach(cell => {
                // 找出目前的作物 class
                let currentCrop = "";
                cropsData.forEach(c => {
                    if(cell.classList.contains(`c-${c.short}`)) {
                        currentCrop = c.short;
                    }
                });
                
                const levelTextEl = cell.querySelector('.level-text');
                const lvl = levelTextEl ? levelTextEl.textContent : "";
                
                if(currentCrop) {
                    dataState.push({
                        z: cell.dataset.zone,
                        r: cell.dataset.row,
                        c: cell.dataset.col,
                        crop: currentCrop,
                        lvl: lvl
                    });
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataState));
        }

        // 2. 載入存檔
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) {
                document.getElementById('saveStatus').textContent = '● 首次開啟(無存檔)';
                return;
            }
            try {
                const dataState = JSON.parse(saved);
                // 先全部恢復清空狀態
                document.querySelectorAll('.cell').forEach(cell => {
                    cropsData.forEach(c => cell.classList.remove(`c-${c.short}`));
                    cell.className = 'cell c-none';
                    cell.innerHTML = '';
                });

                // 依據陣列回填
                dataState.forEach(item => {
                    const cell = document.querySelector(`.cell[data-zone="${item.z}"][data-row="${item.r}"][data-col="${item.c}"]`);
                    if(cell) {
                        cell.classList.remove('c-none');
                        cell.classList.add(`c-${item.crop}`);
                        if(item.lvl) {
                            cell.innerHTML = `<span class="crop-text">${item.crop}</span><span class="level-text">${item.lvl}</span>`;
                        } else {
                            cell.innerHTML = `<span class="crop-text">${item.crop}</span>`;
                        }
                    }
                });
                document.getElementById('saveStatus').textContent = '● 已自動載入上回進度';
            } catch(e) {
                console.error("載入失敗", e);
            }
        }

        // 按鈕：手動保存
        document.getElementById('saveBtn').addEventListener('click', () => {
            autoSaveData();
            showStatus('💾 檔案保存成功！');
        });

        // 按鈕：備份導出 (文字檔格式)
        document.getElementById('exportBtn').addEventListener('click', () => {
            autoSaveData();
            const saved = localStorage.getItem(STORAGE_KEY) || "[]";
            const blob = new Blob([saved], {type: "text/plain;charset=utf-8"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `蛋仔農場備份_${new Date().toLocaleDateString().replace(/\//g, '-')}.txt`;
            a.click();
            showStatus('📤 備份檔案已導出');
        });

        // 按鈕：導入載入
        document.getElementById('importBtn').addEventListener('click', () => {
            const jsonStr = prompt("請貼上之前導出備份文字檔內的全部內容：");
            if(jsonStr) {
                try {
                    // 驗證是否為合法 JSON
                    const parsed = JSON.parse(jsonStr);
                    if(Array.isArray(parsed)) {
                        localStorage.setItem(STORAGE_KEY, jsonStr);
                        loadData();
                        showStatus('📥 備份還原成功！');
                    } else {
                        alert("不合法的備份檔案格式！");
                    }
                } catch(e) {
                    alert("讀取失敗，請確認貼上的文字是否完整。");
                }
            }
        });

        // 頁面初始化載入
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
